<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>名松</title>
<style>
:root{--p:#0f4c81;--pd:#0a365c;--bg:#f4f7fb;--ink:#172033;--l:#d8e1ec;--m:#64748b;--g:#15803d;--y:#d97706;--r:#b91c1c}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft JhengHei",sans-serif;background:linear-gradient(135deg,#eef5fb,#fff);color:var(--ink)}header{background:linear-gradient(135deg,var(--p),#153d5f);color:#fff;padding:30px 20px}.wrap{max-width:1180px;margin:auto}h1{margin:0 0 8px;font-size:30px}header p{margin:0;color:#dcecff}.badge{display:inline-block;margin:12px 6px 0 0;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);font-size:13px}main{padding:22px 18px 48px}.grid{display:grid;grid-template-columns:390px 1fr;gap:18px;align-items:start}@media(max-width:960px){.grid{grid-template-columns:1fr}}.card{background:#fff;border:1px solid var(--l);border-radius:18px;box-shadow:0 12px 30px rgba(15,76,129,.08);overflow:hidden;margin-bottom:16px}.ct{padding:14px 18px;background:#f8fbff;border-bottom:1px solid var(--l)}.ct h2{margin:0;color:var(--pd);font-size:20px}.ct p{margin:5px 0 0;color:var(--m);font-size:13px}.cb{padding:18px}.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:560px){.fg{grid-template-columns:1fr}}label{display:block;font-weight:800;margin:0 0 5px}.unit{font-size:12px;font-weight:400;color:var(--m)}input,select{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:10px;font-size:15px;background:#fff}button{border:0;border-radius:12px;padding:11px 16px;font-weight:900;cursor:pointer}.primary{background:var(--p);color:#fff}.secondary{background:#e2e8f0;color:#1e293b}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}@media(max-width:900px){.metrics{grid-template-columns:1fr 1fr}}@media(max-width:520px){.metrics{grid-template-columns:1fr}}.metric{border:1px solid var(--l);border-radius:14px;background:#fbfdff;padding:13px}.metric .k{font-size:13px;color:var(--m)}.metric .v{font-size:23px;font-weight:900;color:var(--pd);margin-top:3px}.ok{color:var(--g)!important}.warn{color:var(--y)!important}.bad{color:var(--r)!important}.sheet{overflow:auto}.sheet table{width:100%;border-collapse:collapse;min-width:760px}.sheet th,.sheet td{border:1px solid #d7dee8;padding:8px 9px;font-size:13px}.sheet th{background:#eef5fb;color:#0a365c}.sheet td:first-child{font-weight:800;background:#fafafa}.value{font-weight:900;color:#1d4ed8}.note{padding:12px 14px;border-radius:12px;background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12;font-size:14px;line-height:1.55}.small{font-size:13px;color:#64748b;line-height:1.5}.pill{display:inline-block;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:900;background:#f1f5f9;color:#334155}.pill.ok{background:#dcfce7;color:#166534}.pill.warn{background:#fef3c7;color:#92400e}.pill.bad{background:#fee2e2;color:#991b1b}details{border:1px solid var(--l);border-radius:14px;background:#fbfdff;margin-top:12px}summary{cursor:pointer;padding:12px 14px;font-weight:900;color:var(--pd)}details .inside{padding:0 14px 14px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{background:#fff;border:1px solid var(--l);border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer}.tab.active{background:var(--p);color:#fff}.hidden{display:none}.quote{font-family:Consolas,"Microsoft JhengHei",monospace;white-space:pre-wrap;background:#0b1220;color:#e2e8f0;border-radius:14px;padding:14px;line-height:1.65}.num{text-align:right}.source{font-size:12px;color:#64748b;margin-top:8px}
</style>
</head>
<body>

<main class="wrap">
<div class="tabs"><button class="tab active" onclick="showTab('calc',event)">快速選型</button><button class="tab" onclick="showTab('quote',event)">模式</button><button class="tab" onclick="showTab('db',event)">資料</button><button class="tab" onclick="showTab('doc',event)">公式說明</button></div>
<section id="calc" class="page"><div class="grid"><div>
<div class="card"><div class="ct"><h2>案件基本資料</h2><p>首頁只保留真正影響選型的核心欄位。</p></div><div class="cb"><div class="fg">
<div><label>案件名稱</label><input id="caseName" value="新案初估"></div><div><label>客戶名稱</label><input id="customer" value=""></div>
<div><label>載重 <span class="unit">kg</span></label><input id="ratedLoad" type="number" value="2200"></div><div><label>車廂自重 <span class="unit">kg</span></label><input id="carWeight" type="number" value="2700"></div>
<div><label>車廂行程 <span class="unit">mm</span></label><input id="carStrokeMm" type="number" value="15000"></div><div><label>額定速度 <span class="unit">m/min</span></label><input id="carSpeed" type="number" step="0.1" value="20"></div>
<div><label>驅動形式</label><select id="driveType" onchange="driveChange()"><option value="direct1">單缸單節直接式 1:1</option><option value="indirect2">單缸單節間接式 1:2</option><option value="doubleDirect">雙缸直接式</option><option value="tel2">單缸雙節伸縮式</option><option value="tel3" selected>單缸三節伸縮式</option><option value="custom">自訂倍率</option></select></div><div><label>油缸型號</label><input id="cylinderModel" value="MCT3B 100-3J2*15800mm"></div>
<div><label>柱塞序列 <span class="unit">例 100*150*200</span></label><input id="diameterSeries" value="100*150*200"></div><div><label>伸縮缸面積模式</label><select id="telMode"><option value="melsur" selected>Mel模式</option><option value="max">保守最大節</option><option value="sum">理論總和</option></select></div>
</div><div class="actions"><button class="primary" onclick="calculate()">開始計算</button><button class="secondary" onclick="autoMatchCylinder()">自動匹配油缸截面積</button><button class="secondary" onclick="loadPreset('wenquan')">exp.01</button><button class="secondary" onclick="loadPreset('xiegu')">exp.02</button><button class="secondary" onclick="window.print()">列印</button></div>
<details><summary>工程模式：進階參數</summary><div class="inside"><div class="fg">
<div><label>倍率 R <span class="unit">油缸行程/車廂行程</span></label><input id="ratio" type="number" step="0.01" value="1"></div><div><label>油缸數量</label><input id="cylinders" type="number" value="1"></div>
<div><label>配重扣除 K <span class="unit">kg</span></label><input id="counterWeight" type="number" value="0"></div><div><label>柱塞/移動部自重 <span class="unit">kg</span></label><input id="plungerWeight" type="number" value="3600"></div>
<div><label>壓力面積 Ap 覆寫 <span class="unit">cm²；0=自動</span></label><input id="apOverride" type="number" step="0.01" value="0"></div><div><label>流量面積 Aq 覆寫 <span class="unit">cm²；0=自動</span></label><input id="aqOverride" type="number" step="0.01" value="0"></div>
<div><label>摩擦損失 w <span class="unit">直接式5~6；間接式6~8 kg/cm²</span></label><input id="loss" type="number" step="0.5" value="8"></div><div><label>系統效率 η</label><input id="efficiency" type="number" step="0.01" value="0.80"></div>
<div><label>電源頻率</label><select id="frequency"><option value="50">50Hz</option><option value="60" selected>60Hz</option></select></div><div><label>壓力限制 <span class="unit">建議/紅線</span></label><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><input id="targetPressure" type="number" value="70"><input id="maxPressure" type="number" value="80"></div></div>
</div></div></details>
</div></div>
<div class="card"><div class="ct"><h2>輸入摘要</h2></div><div class="cb"><div id="inputSummary" class="small"></div></div></div>
</div><div>
<div class="card"><div class="ct"><h2>快速結果</h2><p>依名松公式：先算靜態壓力 P，再加摩擦損失取得動態壓力 Pw；綠燈可走，黃燈注意，紅燈先改油缸或配置。</p></div><div class="cb"><div class="metrics">
<div class="metric"><div class="k">滿載靜態壓力 P</div><div class="v" id="pFull">-</div></div><div class="metric"><div class="k">動態工作壓力 Pw</div><div class="v" id="pWork">-</div></div><div class="metric"><div class="k">需求流量</div><div class="v" id="flow">-</div></div><div class="metric"><div class="k">理論功率</div><div class="v" id="power">-</div></div>
</div><div id="statusLine" style="margin-top:14px"></div></div></div>
<div class="card"><div class="ct"><h2>自動選型</h2></div><div class="cb sheet"><table><tbody id="selectionTable"></tbody></table></div></div>

<div class="card"><div class="ct"><h2>油壓缸截面積自動匹配</h2><p>只提供載重、車廂重、支撐形式、行程、速度時，系統依壓力安全範圍反推所需 Ap，並推薦常用缸徑。</p></div><div class="cb"><div id="autoCylinderBox" class="small"></div></div></div>
<div class="card"><div class="ct"><h2>計算書</h2></div><div class="cb sheet"><table><tbody id="calcTable"></tbody></table></div></div>
</div></div></section>
<section id="quote" class="page hidden"><div class="card"><div class="ct"><h2>.</h2><p>格式接近現行 MQ 。</p></div><div class="cb"><div id="quoteBlock" class="quote"></div></div></div></section>
<section id="db" class="page hidden"><div class="card"><div class="ct"><h2>LMSP 主機資料庫</h2><p>匯入歷年案件。</p></div><div class="cb sheet"><table><thead><tr><th>主機</th><th>馬達</th><th>泵浦</th><th>流量</th><th>100%壓力</th><th>130%壓力</th><th>閥組</th><th>油箱</th></tr></thead><tbody id="dbBody"></tbody></table></div></div></section>
<section id="doc" class="page hidden"><div class="card"><div class="ct"><h2>公式說明</h2></div><div class="cb"><div class="quote">\</div></div></div></section>
</main>
<script>
const lmspDb=[
{model:'LMSP100/20 #3.5',motor:18.5,pump:'GR40-SM100',flow:117,p100:70,p130:80,valve:'EV100-1 1/2"',tank:'500 L',note:'配置'},
{model:'LMSP150/20 #3.5',motor:18.5,pump:'GR40-SM150',flow:150,p100:55,p130:70,valve:'EV100-1 1/2"',tank:'500 L',note:'中流量'},
{model:'LMSP200/25 #4',motor:22,pump:'GR55-SM200',flow:220,p100:50,p130:65,valve:'EV100-2"',tank:'750 L',note:'中高速'},
{model:'LMSP330/30 #4',motor:29,pump:'GR55-SM300',flow:357,p100:40,p130:53,valve:'EV100-2"',tank:'750 L',note:'配置'},
{model:'LMSP380/30 #5',motor:37,pump:'GR70-SM380',flow:420,p100:45,p130:60,valve:'EV100-2"',tank:'1000 L',note:'大流量'},
{model:'LMSP600/40 #6',motor:45,pump:'GR80-SM600',flow:600,p100:40,p130:55,valve:'EV100-2"+',tank:'1500 L',note:'需確認閥口徑與散熱'}
];
const motorSteps=[3.7,5.5,7.5,11,15,18.5,22,29,37,45,55,75,90];
const commonCylinderDiameters=[80,90,100,110,120,125,130,140,150,160,170,180,190,200,220,230,250,280,300,320];
const commonTelescopicSeries=[
{label:'MCT2B 80*125',ds:[80,125]},{label:'MCT2B 100*150',ds:[100,150]},{label:'MCT2B 120*180',ds:[120,180]},{label:'MCT2B 150*200',ds:[150,200]},
{label:'MCT3B 80*125*170',ds:[80,125,170]},{label:'MCT3B 100*150*200',ds:[100,150,200]},{label:'MCT3B 120*180*230',ds:[120,180,230]},
{label:'MCT3B 150*200*250',ds:[150,200,250]},{label:'MCT3B 180*230*280',ds:[180,230,280]}
];
const presets={
wenquan:{caseName:'J02',customer:'',ratedLoad:2200,carWeight:2700,carStrokeMm:15000,carSpeed:18.7,driveType:'tel3',cylinderModel:'MCT3B 100-3J2*15800mm',diameterSeries:'100*150*200',telMode:'melsur',ratio:1,cylinders:1,counterWeight:0,plungerWeight:3600,apOverride:299.3,aqOverride:190.76,loss:8,efficiency:.8,frequency:60},
xiegu:{caseName:'210603J02',customer:'',ratedLoad:2600,carWeight:2300,carStrokeMm:10000,carSpeed:10.3,driveType:'indirect2',cylinderModel:'MCSA-170*5500mm',diameterSeries:'170',telMode:'max',ratio:.5,cylinders:1,counterWeight:0,plungerWeight:300,apOverride:0,aqOverride:0,loss:8,efficiency:.8,frequency:60}
};
let last={};
function $(id){return document.getElementById(id)}
function num(id){return Number($(id).value)||0}
function showTab(id,e){document.querySelectorAll('.page').forEach(x=>x.classList.add('hidden'));$(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));if(e)e.target.classList.add('active');if(id==='quote')renderQuote();}
function driveChange(){const d=$('driveType').value;let ratio=1,cyl=1;if(d==='indirect2'){ratio=.5;cyl=1}else if(d==='doubleDirect'){ratio=1;cyl=2}else if(d==='tel2'||d==='tel3'||d==='direct1'){ratio=1;cyl=1}if(d!=='custom'){$('ratio').value=ratio;$('cylinders').value=cyl}
if(d==='indirect2'){$('loss').value=8}else if(['direct1','doubleDirect','tel2','tel3'].includes(d)){$('loss').value=6}if(d==='tel2'&&!$('diameterSeries').value.includes('*'))$('diameterSeries').value='120*180';if(d==='tel3')$('diameterSeries').value=$('diameterSeries').value||'100*150*200';calculate();}
function loadPreset(k){Object.entries(presets[k]).forEach(([id,v])=>{if($(id))$(id).value=v});calculate();}
function parseDiameters(){let s=$('diameterSeries').value.trim();if(!s){const m=$('cylinderModel').value.match(/(\d{2,3})\s*[-*x×]/i); if(m) s=m[1];}
return s.split(/[*x×,，\-\s]+/).map(Number).filter(n=>n>0);}
function parseStroke(){const m=$('cylinderModel').value.match(/[*x×]\s*(\d{3,6})\s*(mm)?/i);return m?Number(m[1]):num('carStrokeMm')*num('ratio');}

function areaCm2(d){return Math.PI*d*d/4/100}
function designLoadForArea(){
 const R=num('ratio')||1;
 const gross=(num('ratedLoad')+num('carWeight')-num('counterWeight'))/R;
 return gross*1.05; // 初估階段預留 5% 設計餘裕，避免剛好貼線
}
function autoMatchData(){
 const R=num('ratio')||1, cyl=Math.max(1,num('cylinders')||1);
 const loss=num('loss')||(($('driveType').value==='indirect2')?8:6);
 const target=num('targetPressure')||70, maxp=num('maxPressure')||80;
 const allowTarget=Math.max(1,target-loss);
 const allowMax=Math.max(1,maxp-loss);
 const wDesign=designLoadForArea();
 const reqTotalTarget=wDesign/allowTarget;
 const reqEachTarget=reqTotalTarget/cyl;
 const reqTotalMax=wDesign/allowMax;
 const reqEachMax=reqTotalMax/cyl;
 const dType=$('driveType').value;
 let candidates=[];
 if(dType==='tel2'||dType==='tel3'){
   const needN=dType==='tel2'?2:3;
   candidates=commonTelescopicSeries.filter(x=>x.ds.length===needN).map(x=>{
     const apEach=areaCm2(Math.max(...x.ds));
     const aqEach=x.ds.reduce((a,d)=>a+areaCm2(d),0)/x.ds.length;
     return {kind:'tel',label:x.label,ds:x.ds,apEach,aqEach,totalAp:apEach*cyl,totalAq:aqEach*cyl};
   });
 }else{
   candidates=commonCylinderDiameters.map(d=>({kind:'single',label:`D${d}`,ds:[d],apEach:areaCm2(d),aqEach:areaCm2(d),totalAp:areaCm2(d)*cyl,totalAq:areaCm2(d)*cyl}));
 }
 candidates=candidates.map(c=>{
   const pStatic=wDesign/c.totalAp;
   const pWork=pStatic+loss;
   const cylSpeed=num('carSpeed')*R;
   const flow=c.totalAq*(cylSpeed*100)/1000;
   const kw=pWork*flow/(612*(num('efficiency')||.8));
   return {...c,pStatic,pWork,flow,kw};
 }).filter(c=>c.pWork<=maxp);
 const recommended=candidates.find(c=>c.pWork<=target)||candidates[0]||null;
 const near=candidates.slice(0,5);
 return {R,cyl,loss,target,maxp,wDesign,reqTotalTarget,reqEachTarget,reqTotalMax,reqEachMax,recommended,near,dType};
}
function autoMatchCylinder(){
 const m=autoMatchData();
 if(!m.recommended){$('autoCylinderBox').innerHTML='<span class="pill bad">找不到可在 80 kg/cm² 內使用的常用缸徑，需增加油缸數量、改支撐形式或降低載重。</span>';return;}
 $('diameterSeries').value=m.recommended.ds.join('*');
 $('apOverride').value='0';
 $('aqOverride').value='0';
 if(m.recommended.kind==='tel') $('cylinderModel').value=m.recommended.label+'*'+Math.round(num('carStrokeMm')*(num('ratio')||1))+'mm';
 else $('cylinderModel').value='MCSA-'+m.recommended.ds[0]+'*'+Math.round(num('carStrokeMm')*(num('ratio')||1))+'mm';
 calculate();
}
function renderAutoCylinderBox(){
 const m=autoMatchData();
 if(!m.recommended){$('autoCylinderBox').innerHTML='<span class="pill bad">無常用截面積可滿足 80 kg/cm² 紅線</span>';return;}
 const rows=m.near.map(c=>`<tr><td>${c.label}</td><td>${c.ds.join('*')} mm</td><td class="num">${c.totalAp.toFixed(2)}</td><td class="num">${c.pWork.toFixed(1)}</td><td class="num">${c.flow.toFixed(0)}</td><td class="num">${c.kw.toFixed(1)}</td></tr>`).join('');
 $('autoCylinderBox').innerHTML=`<div class="note">反推需求：目標 ≤${m.target} kg/cm² 時，所需總 Ap ≧ <b>${m.reqTotalTarget.toFixed(2)} cm²</b>；單支所需 Ap ≧ <b>${m.reqEachTarget.toFixed(2)} cm²</b>。若只守 80 kg/cm² 紅線，單支至少 <b>${m.reqEachMax.toFixed(2)} cm²</b>。</div>
 <div style="margin-top:10px"><span class="pill ok">推薦：${m.recommended.label}</span> <span class="pill">總 Ap ${m.recommended.totalAp.toFixed(2)} cm²</span> <span class="pill ${status(m.recommended.pWork).cls}">Pw ${m.recommended.pWork.toFixed(1)} kg/cm²</span></div>
 <div class="sheet" style="margin-top:10px"><table><thead><tr><th>候選</th><th>柱塞序列</th><th>總 Ap cm²</th><th>估算 Pw</th><th>估算 Q</th><th>估算 kW</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function areas(){const ds=parseDiameters();const cyl=Math.max(1,num('cylinders'));const mode=$('telMode').value;let maxD=ds.length?Math.max(...ds):100;const area=d=>Math.PI*d*d/4/100;let ap,aq;if(ds.length>1){if(mode==='sum'){ap=ds.reduce((a,d)=>a+area(d),0);aq=ap}else if(mode==='max'){ap=area(maxD);aq=ap}else{ap=area(maxD);aq=ds.reduce((a,d)=>a+area(d),0)/ds.length}}else{ap=area(maxD);aq=ap}ap*=cyl;aq*=cyl;if(num('apOverride')>0)ap=num('apOverride');if(num('aqOverride')>0)aq=num('aqOverride');return{ds,maxD,ap,aq,cyl};}
function suggestValve(flow){if(flow<=125)return 'EV100-1 1/2"';if(flow<=400)return 'EV100-2"';return 'EV100-2"以上 / 需分流或確認口徑';}
function suggestRupture(flow){if(flow<=150)return 'R10-1 1/2"';if(flow<=800)return 'R10-2"';return '需另選高流量防爆閥';}
function chooseMotor(kw){return motorSteps.find(x=>x>=kw*1.08)||motorSteps[motorSteps.length-1];}
function chooseLMSP(flow,pwork){return lmspDb.filter(x=>x.flow>=flow*1.03 && x.p100>=pwork).sort((a,b)=>a.flow-b.flow||a.motor-b.motor)[0]||lmspDb.filter(x=>x.flow>=flow*.95 && x.p130>=pwork).sort((a,b)=>a.flow-b.flow||a.motor-b.motor)[0]||null;}
function status(p){const target=num('targetPressure')||70,max=num('maxPressure')||80;if(p<=target)return{cls:'ok',txt:'建議區 ≤70 kg/cm²'};if(p<=max)return{cls:'warn',txt:'注意區 70–80 kg/cm²'};return{cls:'bad',txt:'紅線 >80 kg/cm²：不建議'};}
function calculate(){const ar=areas(),R=num('ratio')||1,P=num('ratedLoad'),C=num('carWeight'),K=num('counterWeight'),Pr=num('plungerWeight'),speed=num('carSpeed'),loss=num('loss'),eta=num('efficiency')||.8;const wFull=(P+C-K)/R+Pr;const wEmpty=(C-K)/R+Pr;const pFull=wFull/ar.ap;const pEmpty=wEmpty/ar.ap;const pWork=pFull+loss;const cylSpeed=speed*R;const flow=ar.aq*(cylSpeed*100)/1000;const kw=pWork*flow/(612*eta);const motor=chooseMotor(kw);const valve=suggestValve(flow);const rupture=suggestRupture(flow);const lmsp=chooseLMSP(flow,pWork);const st=status(pWork);const stroke=parseStroke();last={ar,R,P,C,K,Pr,wFull,wEmpty,pFull,pEmpty,pWork,cylSpeed,flow,kw,motor,valve,rupture,lmsp,stroke,st};
$('pFull').textContent=pFull.toFixed(1)+' kg/cm²';$('pWork').textContent=pWork.toFixed(1)+' kg/cm²';$('flow').textContent=flow.toFixed(0)+' L/min';$('power').textContent=kw.toFixed(1)+' kW';['pFull','pWork'].forEach(id=>{$(id).className='v '+st.cls});
$('statusLine').innerHTML=`<span class="pill ${st.cls}">${st.txt}</span> <span class="pill">建議馬達 ${motor} kW</span> <span class="pill">${lmsp?('推薦 '+lmsp.model):'無標準主機完全匹配'}</span>`;
$('inputSummary').innerHTML=`油缸型號：<b>${$('cylinderModel').value}</b><br>柱塞序列：${ar.ds.join(' / ')||'-'} mm；最大節 ${ar.maxD} mm；Ap=${ar.ap.toFixed(2)} cm²；Aq=${ar.aq.toFixed(2)} cm²<br>R=${R}；油缸行程≈${(num('carStrokeMm')*R).toFixed(0)} mm；型號標示長度≈${stroke.toFixed(0)} mm`;
$('selectionTable').innerHTML=`<tr><td>推薦主機</td><td class="value">${lmsp?lmsp.model:'需工程確認 / 非標準'}</td><td>${lmsp?lmsp.note:'請調整流量、壓力或新增資料庫型號'}</td></tr><tr><td>馬達</td><td class="value">${lmsp?lmsp.motor:motor} kW</td><td>理論 ${kw.toFixed(1)} kW</td></tr><tr><td>泵浦</td><td class="value">${lmsp?lmsp.pump:'依流量另選'}</td><td>需求流量 ${flow.toFixed(0)} L/min</td></tr><tr><td>控制閥</td><td class="value">${lmsp?lmsp.valve:valve}</td><td>依流量口徑初估</td></tr><tr><td>防爆閥</td><td class="value">${rupture}</td><td>依 Q-max 初估</td></tr><tr><td>油箱</td><td class="value">${lmsp?lmsp.tank:(flow<160?'500 L':flow<400?'750 L':'1000 L以上')}</td><td>正式需確認油溫與安裝空間</td></tr>`;
$('calcTable').innerHTML=`<tr><td>截面積公式</td><td>A = 0.785 × D²；Ap=${ar.ap.toFixed(2)} cm²，Aq=${ar.aq.toFixed(2)} cm²</td></tr><tr><td>空載靜態壓力 P</td><td class="value">${pEmpty.toFixed(1)} kg/cm²</td></tr><tr><td>滿載靜態壓力 P</td><td class="value">${pFull.toFixed(1)} kg/cm²</td></tr><tr><td>動態工作壓力 Pw</td><td class="value">${pFull.toFixed(1)} + ${loss.toFixed(1)} = ${pWork.toFixed(1)} kg/cm²</td></tr><tr><td>需求流量 Q</td><td class="value">${ar.aq.toFixed(2)} × ${(cylSpeed*100).toFixed(0)} ÷ 1000 = ${flow.toFixed(1)} L/min</td></tr><tr><td>理論功率 kW</td><td class="value">${pWork.toFixed(1)} × ${flow.toFixed(1)} ÷ (612 × ${eta}) = ${kw.toFixed(1)} kW</td></tr><tr><td>油缸速度</td><td>${cylSpeed.toFixed(2)} m/min</td></tr><tr><td>油缸行程</td><td>${(num('carStrokeMm')*R).toFixed(0)} mm</td></tr><tr><td>滿載油缸受力</td><td>${wFull.toFixed(0)} kgf</td></tr>`;
renderAutoCylinderBox();renderQuote();renderDb();}
function renderQuote(){if(!last.pWork)calculate();const lmsp=last.lmsp; $('quoteBlock').textContent=`客戶名稱：${$('customer').value||'-'}\n案件名稱：${$('caseName').value}\n\n載重：${num('ratedLoad')} kg\n車廂自重：${num('carWeight')} kg\n車廂行程：${num('carStrokeMm')} mm\n額定速度：${num('carSpeed')} m/min\n驅動方式：${$('driveType').selectedOptions[0].text}\n油壓缸組合：${$('cylinderModel').value}（${last.ar.ds.join('*')}）\n\n空載壓力：約 ${last.pEmpty.toFixed(1)} kg/cm²\n滿載壓力：約 ${last.pFull.toFixed(1)} kg/cm²\n動態工作壓力：約 ${last.pWork.toFixed(1)} kg/cm²\n需求流量：約 ${last.flow.toFixed(0)} L/min\n理論功率：約 ${last.kw.toFixed(1)} kW，效率值 ${num('efficiency').toFixed(2)}\n\n油壓動力主機：${lmsp?lmsp.model:'非標準配置，需工程確認'}\n馬達：${lmsp?lmsp.motor:last.motor} kW\n泵浦：${lmsp?lmsp.pump:'依流量另選'}\n昇降閥組：${lmsp?lmsp.valve:last.valve}\n防爆閥：${last.rupture}\n油箱組合：${lmsp?lmsp.tank:'依流量與散熱另估'}\n\n設計判斷：${last.st.txt}
公式基準：P=F/A；Pw=P+w；Q=A×V/1000；kW=Pw×Q/(612×η)`;}
function renderDb(){ $('dbBody').innerHTML=lmspDb.map(x=>`<tr><td>${x.model}</td><td class="num">${x.motor} kW</td><td>${x.pump}</td><td class="num">${x.flow}</td><td class="num">${x.p100}</td><td class="num">${x.p130}</td><td>${x.valve}</td><td>${x.tank}</td></tr>`).join('');}
calculate();
</script>
